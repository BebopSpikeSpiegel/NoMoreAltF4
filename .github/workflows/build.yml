name: Build

on:
  push:
    branches:
      - master
  release:
    types: [ created ]
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: [ windows-latest ]

    steps:
    - name: Get latest CMake and ninja
      uses: lukka/get-cmake@latest

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup VS environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build and install debug
      run: |
        cmake --preset x64-Debug .
        cmake --build _build/x64-Debug --parallel
        cmake --install _build/x64-Debug

    - name: Build and install release
      run: |
        cmake --preset x64-Release .
        cmake --build _build/x64-Release --parallel
        cmake --install _build/x64-Release

    - name: Copy debug artifacts
      run: |
        mkdir _dist-debug
        Copy-Item _install/x64-Debug/bin/* -Destination _dist-debug/ -Recurse
        Copy-Item LICENSE -Destination _dist-debug/LICENSE

    - name: Copy release artifacts
      run: |
        mkdir _dist-release
        Copy-Item _install/x64-Release/bin/* -Destination _dist-release/ -Recurse
        Copy-Item LICENSE -Destination _dist-release/LICENSE

    - name: Archive debug
      uses: actions/upload-artifact@v4
      with:
        name: NoMoreAltF4-Debug
        path: _dist-debug/*

    - name: Archive release
      uses: actions/upload-artifact@v4
      with:
        name: NoMoreAltF4-Release
        path: _dist-release/*

  upload_release:
    name: Upload release artifacts
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
    - name: Download debug artifact
      uses: actions/download-artifact@v4
      with:
        name: NoMoreAltF4-Debug
        path: NoMoreAltF4-Debug

    - name: Download release artifact
      uses: actions/download-artifact@v4
      with:
        name: NoMoreAltF4-Release
        path: NoMoreAltF4-Release

    - name: Archive artifact files
      run: |
        cd NoMoreAltF4-Debug && zip -r ../NoMoreAltF4-Debug.zip * && cd ..
        cd NoMoreAltF4-Release && zip -r ../NoMoreAltF4-Release.zip * && cd ..

    - name: Upload assets to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "${{ github.event.release.tag_name }}" \
          NoMoreAltF4-Debug.zip \
          NoMoreAltF4-Release.zip \
          --repo "${{ github.repository }}"

    - name: Upload Debug to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.3
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7254587
        filename: NoMoreAltF4-Debug.zip
        version: ${{ github.event.release.tag_name }}
        display_name: "NoMoreAltF4 Debug ${{ github.event.release.tag_name }}"
        file_category: main
        description: |
          Pops up a debug terminal on start.

          NoMoreAltF4 ${{ github.event.release.tag_name }} — ZHMModSDK plugin that automates the Alt-F4 exploit to prevent mission failure penalties in Freelancer and Elusive Targets.

          Changelog:
          ${{ github.event.release.body }}

    - name: Upload Release to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.3
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7260392
        filename: NoMoreAltF4-Release.zip
        version: ${{ github.event.release.tag_name }}
        display_name: "NoMoreAltF4 Release ${{ github.event.release.tag_name }}"
        file_category: main
        description: |
          NoMoreAltF4 ${{ github.event.release.tag_name }} — ZHMModSDK plugin that automates the Alt-F4 exploit to prevent mission failure penalties in Freelancer and Elusive Targets.

          Changelog:
          ${{ github.event.release.body }}
